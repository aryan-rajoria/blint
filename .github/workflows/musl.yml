name: Build Linux Musl Binaries

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
permissions: {}
jobs:
  Blint-Musl-Build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            binary_name: blint-linux-musl-amd64
          - os: ubuntu-24.04-arm
            binary_name: blint-linux-musl-arm64
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        path: blint
        persist-credentials: false
    # Build inside an Alpine 3.20 container that matches the runner arch
    # natively (no QEMU). Checkout / upload / release stay on the host so the
    # JavaScript actions keep working, which they cannot do inside an Alpine
    # container on arm64 runners.
    - name: Binary musl build
      run: |
        docker run --rm \
          -v "${{ github.workspace }}/blint:/src" \
          -w /src \
          -e PYTHONIOENCODING=utf-8 \
          -e LANG=en_US.utf-8 \
          -e BINARY_NAME=${{ matrix.binary_name }} \
          -e HOST_UID="$(id -u)" \
          -e HOST_GID="$(id -g)" \
          alpine:3.20 sh -euc '
            apk add --no-cache \
              python3 python3-dev py3-pip \
              build-base cmake make git \
              musl-dev libffi-dev openssl-dev zlib-dev zstd-dev xz \
              llvm18-dev llvm18-static clang18 \
              ncurses-dev libxml2-dev

            export NYXSTONE_LLVM_PREFIX=/usr/lib/llvm18

            # Work inside a venv so we do not fight Alpine'\''s externally-managed
            # system Python (poetry cannot uninstall apk-provided packages).
            python3 -m venv /opt/venv
            . /opt/venv/bin/activate
            pip install --upgrade pip
            pip install setuptools pyinstaller poetry pybind11

            # nyxstone ships only sdists and must be compiled against LLVM 18.
            # Its source declares `constexpr uint64_t PAGE_SIZE`, which collides
            # with the PAGE_SIZE macro from musl headers; patch a local #undef
            # in before building it.
            NYX_SRC=$(mktemp -d)
            pip download --no-binary :all: --no-deps --no-build-isolation \
              nyxstone==0.1.8 -d "$NYX_SRC"
            tar -xzf "$NYX_SRC"/nyxstone-*.tar.gz -C "$NYX_SRC"
            sed -i "s|constexpr uint64_t PAGE_SIZE { 0x1000 };|#undef PAGE_SIZE\n                constexpr uint64_t PAGE_SIZE { 0x1000 };|" \
              "$NYX_SRC"/nyxstone-*/nyxstone-cpp/src/nyxstone.cpp
            pip install --no-build-isolation "$NYX_SRC"/nyxstone-*/

            poetry config virtualenvs.create false
            # Skip the extended group so poetry does not recompile the unpatched
            # nyxstone over the patched build we just installed.
            poetry install --all-extras --without extended --no-cache

            pyinstaller blint/cli.py --noconfirm --log-level=WARN \
              --nowindow \
              --onefile \
              --name "$BINARY_NAME" \
              --add-data="blint/data:blint/data" \
              --add-data="blint/data/annotations:blint/data/annotations" \
              --collect-submodules blint \
              --collect-submodules multi-demangle \
              --collect-submodules oras \
              --collect-all nyxstone \
              --hidden-import nyxstone_cpp \
              --noupx
            # Confirm the bundled disassembler is available in the frozen binary
            "./dist/$BINARY_NAME" --help >/dev/null
            "./dist/$BINARY_NAME" -i "dist/$BINARY_NAME" -o /tmp/reports
            sha256sum "./dist/$BINARY_NAME" > "./dist/$BINARY_NAME.sha256"

            # Files are created as root in the container; hand them back to the
            # host runner user so the upload/release steps can read them.
            chown -R "$HOST_UID:$HOST_GID" dist build *.spec 2>/dev/null || true
          '
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        path: ./blint/dist
        name: ${{ matrix.binary_name }}
    - name: Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          blint/dist/${{ matrix.binary_name }}
          blint/dist/${{ matrix.binary_name }}.sha256
