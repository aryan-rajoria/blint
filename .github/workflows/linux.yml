name: Build Linux Binaries

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
permissions: {}
jobs:
  Blint-GNU-Build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            binary_name: blint-linux-amd64
          - os: ubuntu-24.04-arm
            binary_name: blint-linux-arm64
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        path: blint
        persist-credentials: false
    - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
      with:
        python-version: '3.13'
    - name: Linux packages
      run: |
        sudo apt-get update
        sudo apt-get install zlib1g-dev libzstd-dev llvm-18 llvm-18-dev
    - name: Install poetry
      id: poetry
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install setuptools pyinstaller poetry
        cd blint
        poetry config virtualenvs.create false
        poetry install --all-groups --all-extras --no-cache
      env:
        NYXSTONE_LLVM_PREFIX: /usr/lib/llvm-18
    - name: Binary gnu build
      run: |
        cd blint
        pyinstaller blint/cli.py --noconfirm --log-level=WARN \
          --nowindow \
          --onefile \
          --name ${{ matrix.binary_name }} \
          --add-data="blint/data:blint/data" \
          --add-data="blint/data/annotations:blint/data/annotations" \
          --collect-submodules blint \
          --collect-submodules multi-demangle \
          --collect-submodules oras \
          --collect-all nyxstone \
          --hidden-import nyxstone_cpp \
          --noupx
        # Confirm the bundled disassembler is available in the frozen binary
        ./dist/${{ matrix.binary_name }} --help >/dev/null
        ./dist/${{ matrix.binary_name }} -i dist/${{ matrix.binary_name }} -o /tmp/reports
        sha256sum ./dist/${{ matrix.binary_name }} > ./dist/${{ matrix.binary_name }}.sha256
      env:
        PYTHONIOENCODING: utf-8
        LANG: en_US.utf-8
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        path: ./blint/dist
        name: ${{ matrix.binary_name }}
    - name: Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          blint/dist/${{ matrix.binary_name }}
          blint/dist/${{ matrix.binary_name }}.sha256    
