name: Build Windows Binaries

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
permissions: {}
jobs:
  Blint-Build:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        path: blint
        persist-credentials: false
    - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
      with:
        cache: false
    - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
      with:
        python-version: '3.14'
    - name: Install poetry
      id: poetry
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools pyinstaller tzdata poetry
        cd blint
        poetry config virtualenvs.create false
        poetry install --without=extended --no-cache
    - name: Binary windows build
      run: |
        cd blint
        pyinstaller blint/cli.py --noconfirm --log-level=WARN --nowindow --onefile --name blint --add-data="blint/data;blint/data" --add-data="blint/data/annotations;blint/data/annotations" --collect-submodules blint --collect-submodules multi-demangle --collect-submodules oras --disable-windowed-traceback -i blint.ico --version-file=file_version_info.txt --noupx
        (Get-FileHash .\dist\blint.exe).hash | Out-File -FilePath .\dist\blint.exe.sha256
        set PYTHONIOENCODING=UTF-8
        .\dist\blint.exe -i .\dist\blint.exe -o reports --no-banner
      env:
        PYTHONIOENCODING: utf-8
        LANG: en_US.utf-8
        PYTHONUTF8: 1
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        path: blint/dist
        name: blint-windows
    - name: Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          blint/dist/blint.exe
          blint/dist/blint.exe.sha256