name: Build Mac Binaries

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
permissions: {}
jobs:
  Blint-Darwin-Build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            binary_name: blint-darwin-arm64
          - os: macos-15-intel
            binary_name: blint-darwin-amd64
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        path: blint
        persist-credentials: false
    - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
      with:
        python-version: '3.13'
    # nyxstone ships only sdists, so it must be compiled against LLVM 18.
    # Homebrew's LLVM static libs are single-arch, so we build a single-arch
    # extension matching the runner (not universal2) and force C++17 with the
    # homebrew clang, which the stock nyxstone setup.py does not do itself.
    - name: Install LLVM 18
      run: |
        brew install llvm@18 zstd
        LLVM_PREFIX="$(brew --prefix llvm@18)"
        BREW_PREFIX="$(brew --prefix)"
        {
          echo "NYXSTONE_LLVM_PREFIX=${LLVM_PREFIX}"
          echo "CC=${LLVM_PREFIX}/bin/clang"
          echo "CXX=${LLVM_PREFIX}/bin/clang++"
          echo "CXXFLAGS=-std=c++17"
          echo "LDFLAGS=-L${BREW_PREFIX}/lib -Wl,-rpath,${BREW_PREFIX}/lib"
          echo "ARCHFLAGS=-arch $(uname -m)"
        } >> "$GITHUB_ENV"
        echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
    - name: Install poetry
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install setuptools pyinstaller poetry
        cd blint
        poetry config virtualenvs.create false
        poetry install --all-groups --all-extras --no-cache
    - name: Binary darwin build
      run: |
        cd blint
        pyinstaller blint/cli.py --noconfirm --log-level=WARN \
          --nowindow \
          --onefile \
          --name ${{ matrix.binary_name }} \
          --add-data="blint/data:blint/data" \
          --add-data="blint/data/annotations:blint/data/annotations" \
          --collect-submodules blint \
          --collect-submodules multi-demangle \
          --collect-submodules oras \
          --collect-all nyxstone \
          --hidden-import nyxstone_cpp \
          --icon ./blint.icns \
          --noupx
        # Confirm the bundled disassembler is available in the frozen binary
        ./dist/${{ matrix.binary_name }} --help >/dev/null
        ./dist/${{ matrix.binary_name }} -i dist/${{ matrix.binary_name }} -o /tmp/reports
        shasum -a 256 ./dist/${{ matrix.binary_name }} > ./dist/${{ matrix.binary_name }}.sha256
      env:
        PYTHONIOENCODING: utf-8
        LANG: en_US.utf-8
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        path: ./blint/dist
        name: ${{ matrix.binary_name }}
    - name: Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          blint/dist/${{ matrix.binary_name }}
          blint/dist/${{ matrix.binary_name }}.sha256
