name: Python matrix CI

on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions: {}
jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        persist-credentials: false
    - name: Linux packages
      run: |
        sudo apt-get update
        sudo apt-get install zlib1g-dev libzstd-dev llvm-18 llvm-18-dev
      if: runner.os == 'Linux'
    - name: Packages
      run: |
        brew install llvm@18
        echo /opt/homebrew/opt/llvm@18/bin >> $GITHUB_PATH
      if: runner.os == 'macOS'
    - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
      with:
        cache: false
    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Display Python version
      run: python -c "import sys; print(sys.version)"
    - name: Use Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
      with:
        node-version: '24.x'
    - name: Set up JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Install poetry
      run: |
        python3 -m pip install poetry
    - name: Install all
      run: |
        poetry install --all-groups --all-extras
      if: runner.os == 'Linux'
      env:
        NYXSTONE_LLVM_PREFIX: /usr/lib/llvm-18
    - name: Install all
      run: |        
        poetry install --all-groups --all-extras
      if: runner.os == 'macOS'
      env:
        NYXSTONE_LLVM_PREFIX: /opt/homebrew/opt/llvm@18
        LDFLAGS: "-L/opt/homebrew/lib"
        CPPFLAGS: "-I/opt/homebrew/include"
    - name: Install all
      run: |        
        poetry install --without=extended --all-extras
      if: runner.os == 'Windows'
    - name: Test with pytest
      run: |
        poetry run pytest --cov=blint tests
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        poetry run flake8 . --count --exit-zero --statistics
    - name: Build on linux
      run: |  
        poetry build --no-cache
      if: runner.os == 'Linux'
      env:
        NYXSTONE_LLVM_PREFIX: /usr/lib/llvm-18
